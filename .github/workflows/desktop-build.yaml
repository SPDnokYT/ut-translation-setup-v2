name: Wails build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or tag to build"
        required: true
        default: "v1.2.3"

env:
  APP_NAME: "UntilThenPTBR"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-latest"
            arch: "amd64"
          - platform: "windows/amd64"
            os: "windows-latest"
            arch: "amd64"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get Tag Name
        shell: bash
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set Binary Name
        shell: bash
        run: |
          # Replace slashes in platform for the filename (e.g., windows/amd64 -> windows-amd64)
          PLATFORM_STR=$(echo "${{ matrix.build.platform }}" | tr '/' '-')
          FULL_NAME="${{ env.APP_NAME }}-${{ env.TAG_NAME }}-$PLATFORM_STR"

          # Add .exe extension if on Windows
          if [[ "${{ matrix.build.os }}" == *"windows"* ]]; then
            echo "FINAL_BINARY_NAME=${FULL_NAME}.exe" >> $GITHUB_ENV
          else
            echo "FINAL_BINARY_NAME=${FULL_NAME}" >> $GITHUB_ENV
          fi

      - name: Build wails
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ env.FINAL_BINARY_NAME }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: "1.23"
          node-version: "22.x"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # The wails action usually outputs the built binary to build/bin/
          files: build/bin/${{ env.FINAL_BINARY_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
